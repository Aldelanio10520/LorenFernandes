<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Inicialize com sua Public Key
            emailjs.init("YND0XXXZxA-ozlJg-");
        })();
    </script>
</head>
<body>
    <label>Nome: <input id="meu-input-isolado" type="text" name="user_name" required></label><br>
    <button type="button" id="botao-enviar">Enviar apenas este campo</button>

    <script>
        // Selecionamos o botão e o input
    const botao = document.getElementById('botao-enviar');    
    const inputFora = document.getElementById('meu-input-isolado');

    botao.addEventListener('click', function() {
    
    // 1. Pegamos o valor do input exatamente no momento do clique
    const valorParaEnviar = inputFora.value;

    // 2. Criamos o objeto que o EmailJS espera
    // "mensagem_recebida" deve ser o nome que você usou no Template do EmailJS: {{mensagem_recebida}}
    const parametros = {
        mensagem_recebida: valorParaEnviar 
    };

    // 3. Enviamos
    emailjs.send('service_3h4jygt', 'template_dfuhyzi', parametros)
        .then(() => {
            alert('Enviado: ' + valorParaEnviar);
        })
        .catch((err) => {
            console.error('Erro:', err);
        });
});
</script>
    
</body>
</html>
