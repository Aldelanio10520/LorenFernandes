<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Envio de Email com Anexo</title>
    
</head>
<body>
    
    <form action="https://api.web3forms.com/submit" method="POST" enctype="multipart/form-data">
    
    <input type="hidden" name="access_key" value="ad75f767-3c16-4a9d-a128-95012009faf0">
    
    <input type="text" name="name" placeholder="Seu Nome" required>
    <input type="email" name="email" placeholder="Seu Email" required>
    
    <label for="arquivo">Anexar ficheiro:</label>
    <input type="file" id="attachment" name="attachment" />

    <button type="submit">Enviar</button>
    </form>

    <script>
        const form = document.getElementById("myForm");

        form.addEventListener("submit", function (e) {
        e.preventDefault();
        
        const formData = new FormData(form);
        
        formData.append("access_key", "YOUR_ACCESS_KEY_HERE");
        formData.append("subject", "New Submission from Web3Forms");

        const file = document.getElementById("attachment");
        const filesize = file.files[0].size / 1024;

        if (filesize > 1000) {
            alert("Please upload file less than 1 MB");
            return;
        }
        
        // Don't add `headers` or `content-type` in this fetch call
        // Since it contains attachments, the browser auto-adds them. 
        fetch("https://api.web3forms.com/submit", {
            method: "POST",
            body: formData
        })
            .then(async (response) => {
            let json = await response.json();
            if (response.status == 200) {
                console.log(json.message);
            } else {
                console.log(response);
            }
            })
            .catch((error) => {
            console.log(error);
            })
            .then(function () {
            form.reset();
            });
        });
        </script>

</body>
</html>
