<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato via EmailJS</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Inicialize com sua Public Key
            emailjs.init("YND0XXXZxA-ozlJg-");
        })();
    </script>
</head>
<body>

    <h2>Envie uma mensagem</h2>
    <form id="contact-form">
        <label>Nome:</label>
        <input type="text" name="user_name" required>
        
        <label>Email:</label>
        <input type="email" name="user_email" required>
        
        <label>Mensagem:</label>
        <textarea name="message" required></textarea>
        
        <button type="submit">Enviar Email</button>
    </form>

    <script>
        const btn = document.getElementById('contact-form');

        btn.addEventListener('submit', function(event) {
            event.preventDefault();

            // Altera o texto do botão para dar feedback ao usuário
            const submitBtn = this.querySelector('button');
            submitBtn.innerText = 'Enviando...';

            // serviceID, templateID, templateParams (ou o elemento do form)
            emailjs.sendForm('service_3h4jygt', 'template_dfuhyzi', this)
                .then(function() {
                    alert('E-mail enviado com sucesso!');
                    submitBtn.innerText = 'Enviar Email';
                    btn.reset(); // Limpa o formulário
                }, function(error) {
                    alert('Falha ao enviar... ' + JSON.stringify(error));
                    submitBtn.innerText = 'Tentar novamente';
                });
        });
    </script>

</body>
</html>
